<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slimes Hub | Delivery & Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0">📦 Slimes Hub</h3>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="btn-delivery" onclick="openTab('delivery')">ДОСТАВКА</button>
        <button class="tab-btn" id="btn-track" onclick="openTab('track')">ТРЕКИНГ</button>
        <button class="tab-btn" id="btn-transfer" onclick="openTab('transfer')">ПЕРЕВОДЫ</button>
    </div>

    <!-- ДОСТАВКА -->
    <div id="section-delivery" class="section active">
        <div class="form-group">
            <label>Тариф:</label>
            <select id="tariff" onchange="calculate()">
                <option value="0.09">Super Economy ($0.09) - до 3 дней</option>
                <option value="0.29">Economy ($0.29) - 1-2 дня</option>
                <option value="0.49">Standard ($0.49) - Трекинг</option>
                <option value="0.69">FreeFast ($0.69) - Без очереди</option>
                <option value="0.99">Speedy Delivery ($0.99) - День в день</option>
                <option value="1.19">SuperFast ($1.19) - SMS Трекинг</option>
                <option value="1.49">Express ($1.49) - 30 минут</option>
                <option value="1.99" id="universal-opt">Universal ($1.99) - до 10кг</option>
                <option value="2.59">International ($2.59) - Другие отряды</option>
                <option value="0">Самовывоз (Бесплатно)</option>
            </select>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label id="w-label">Вес (г): [Макс 3кг]</label>
                <input type="number" id="weight" value="100" oninput="calculate()">
            </div>
            <div class="form-group">
                <label>Стоимость заказа ($):</label>
                <input type="number" id="orderSum" value="0" oninput="calculate()">
            </div>
        </div>

        <div class="form-group">
            <label>Страхование:</label>
            <select id="insurance" onchange="calculate()">
                <option value="none">Без страхования</option>
                <option value="initial">Начальное ($1 за каждые $5)</option>
                <option value="basic">Базовое ($3 за каждые $10)</option>
                <option value="full">Полное ($5 за 10г)</option>
                <option value="delivery">Страхование доставки ($2 за 15г)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Оформление / Документы:</label>
            <select id="docs" onchange="calculate()">
                <option value="schengen">Schengen VISA ($1, без налога)</option>
                <option value="west">West Euro Visa ($1.50, без налога)</option>
                <option value="other">Прочие документы ($1 + 18% сборы)</option>
                <option value="none">Без документов ($2.50)</option>
            </select>
        </div>

        <label>Дополнительные услуги:</label>
        <div class="services-grid">
            <label><input type="checkbox" class="extra" value="2.99" onchange="calculate()"> Ускор. обработка</label>
            <label><input type="checkbox" class="extra" value="5.99" onchange="calculate()"> Декларация (профи)</label>
            <label><input type="checkbox" class="extra" value="2.99" onchange="calculate()"> Ускор. сборка</label>
            <label><input type="checkbox" class="extra" value="5" onchange="calculate()"> Фото ч/б (физ)</label>
            <label><input type="checkbox" class="extra" value="8" onchange="calculate()"> Фото цвет (цифра)</label>
            <label><input type="checkbox" class="extra" value="2" onchange="calculate()"> Фото на весах</label>
        </div>

        <div class="form-group" style="margin-top:15px">
            <label>Способ получения:</label>
            <select id="method" onchange="toggleAddr()">
                <option value="0">В отделении (Бесплатно)</option>
                <option value="0.49">До двери ($0.49)</option>
                <option value="0.89">В руки ($0.89)</option>
                <option value="1.5">Партнер (~$1.50)</option>
            </select>
        </div>

        <div id="addr-fields" class="hidden">
            <label style="color:var(--primary)">Адрес встречи:</label>
            <div class="grid-2">
                <input type="text" id="a1" placeholder="Корпус">
                <input type="text" id="a2" placeholder="Комната">
                <input type="text" id="a3" placeholder="Имя получателя">
                <input type="text" id="a4" placeholder="Zip-code">
            </div>
        </div>

        <div class="price-card">ИТОГО К ОПЛАТЕ: $<span id="total-del">0.00</span></div>
        <button class="btn-action" id="btn-del-main" onclick="processOrder('delivery')">ОФОРМИТЬ ДОСТАВКУ</button>
    </div>

    <!-- ТРЕКИНГ -->
    <div id="section-track" class="section">
        <div class="info-box">Введите трек-номер для проверки статуса.</div>
        <input type="text" id="track-input" placeholder="SLM-XXX-X">
        <button class="btn-action" style="margin-top:15px" onclick="checkTrackFromSheet()">ПРОВЕРИТЬ</button>
        <div id="track-status-res" class="status-res"></div>
    </div>

    <!-- ПЕРЕВОДЫ -->
    <div id="section-transfer" class="section">
        <div class="info-box">Swift-Bypass: обход санкций. Комиссия 5%.</div>
        <div class="form-group">
            <label>Сумма перевода ($):</label>
            <input type="number" id="trans-amount" value="100" oninput="calcTrans()">
        </div>
        <div class="form-group">
            <label>Страна назначения:</label>
            <input type="text" id="trans-country" placeholder="Куда отправляем?">
        </div>
        <div class="price-card">К ПОЛУЧЕНИЮ: $<span id="total-trans">95.00</span></div>
        <button class="btn-action" onclick="processOrder('transfer')">ЗАЯВКА НА ПЕРЕВОД</button>
    </div>

    <div id="copy-box" class="copy-box">
        <p>Отправьте на: <strong>slimes.upon-7k@icloud.com</strong></p>
        <div id="email-text" class="email-pre"></div>
        <button class="copy-btn" onclick="copyResult()">КОПИРОВАТЬ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
